            float: {
              '0%, 100%': { transform: 'translateY(0)' },

              '0%, 100%': { opacity: '1', transform: 'scale(1)' },

            'sakura-fall': {
              '0%': { transform: 'translateY(-10vh) rotate(0deg) translateX(0)', opacity: '1' },
              '25%': { transform: 'translateY(25vh) rotate(90deg) translateX(20px)', opacity: '0.9' },

              '100%': { transform: 'translateY(100vh) rotate(360deg) translateX(0)', opacity: '0' },
            },
            'heart-beat': {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.1)' },
            },
          }
        }
      }
    }

<script>
const STORAGE_KEY = "star_anime_time_record";
const STORAGE_WAGE = "star_anime_hour_wage";
const $ = (s) => document.querySelector(s);
const listWrap = $("#listWrap");
const editModal = $("#editModal");
let workChart = null;

const getAll = () => JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
const setAll = (arr) => localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
const getWage = () => Number(localStorage.getItem(STORAGE_WAGE)) || 0;
const setWage = (val) => localStorage.setItem(STORAGE_WAGE, Number(val) || 0);

const fmtToday = () => new Date().toISOString().split("T")[0];

function showToast(message, type = 'success') {
  Swal.fire({
    toast: true,
    position: 'top-right',
    icon: type,
    title: message,
    showConfirmButton: false,
    timer: 2000,
    backdrop: false,
    customClass: {
      popup: 'glass-card rounded-xl',
      title: 'text-lavender-500'
    }
  });
}

function getDuration(start, end) {
  if (!start || !end) return 0;
  let [sh, sm] = start.split(":").map(Number);
  let [eh, em] = end.split(":").map(Number);
  let sMin = sh * 60 + sm;
  let eMin = eh * 60 + em;
  let diff = eMin - sMin;
  return diff <= 0 ? 0 : Math.round((diff / 60) * 10) / 10;
}

function statistics() {
  const list = getAll();
  const hourWage = getWage();
  $("#totalCount").textContent = list.length;

  const totalWorkHour = list
    .filter(item => item.type === "上班")
    .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  
  $("#totalWorkHour").textContent = totalWorkHour.toFixed(1) + "h";
  const totalWage = totalWorkHour * hourWage;
  $("#totalWage").textContent = "¥" + totalWage.toFixed(2);

  const today = fmtToday();
  const todayList = list.filter(item => item.date === today);
  $("#todayCount").textContent = todayList.length;
  const todayWorkHour = todayList
    .filter(item => item.type === "上班")
    .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  $("#todayHours").textContent = todayWorkHour.toFixed(1) + "h";
  $("#todayWage").textContent = "¥" + (todayWorkHour * hourWage).toFixed(2);

  renderChart(list);
}

function renderChart(list) {
  const ctx = document.getElementById('workChart');
  if (!ctx) return;

  const last7Days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    last7Days.push(d.toISOString().split("T")[0]);
  }

  const workData = last7Days.map(date => {
    return list
      .filter(item => item.date === date && item.type === "上班")
      .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  });

  const restData = last7Days.map(date => {
    return list
      .filter(item => item.date === date && item.type === "休息")
      .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  });

  const labels = last7Days.map(date => {
    const d = new Date(date);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  });

  if (workChart) {
    workChart.destroy();
  }

  workChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: '工作时长',
          data: workData,
          backgroundColor: 'rgba(255, 105, 180, 0.65)',
          borderRadius: 6,
        },
        {
          label: '休息时长',
          data: restData,
          backgroundColor: 'rgba(147, 112, 219, 0.65)',
          borderRadius: 6,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#4B0082',
            font: {
              family: '"ZCOOL KuaiLe", sans-serif'
            },
            padding: 16,
            usePointStyle: true
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: {
            color: 'rgba(255, 183, 197, 0.15)'
          },
          ticks: {
            color: '#4B0082'
          }
        },
        x: {
          grid: {
            display: false
          },
          ticks: {
            color: '#4B0082'
          }
        }
      }
    }
  });
}

function highlight(text, kw) {
  if (!kw) return text;
  const reg = new RegExp(`(${kw})`, "gi");
  return text.replace(reg, '<span class="highlight-romance">$1</span>');
}

function render(searchKw = "") {
  const list = getAll().sort((a, b) => b.id - a.id);
  const empty = $("#empty");

  const filtered = searchKw
    ? list.filter(item =>
        item.date.includes(searchKw) ||
        item.start.includes(searchKw) ||
        item.end.includes(searchKw) ||
        item.title.includes(searchKw) ||
        item.type.includes(searchKw)
      )
    : list;

  if (filtered.length === 0) {
    listWrap.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  let html = "";
  filtered.forEach(item => {
    html += `
    <div class="card-romance" data-id="${item.id}">
      <div class="flex justify-between items-start mb-3">
        <span class="tag-romance text-xs px-3 py-1.5 rounded-full">${highlight(item.type === '上班' ? '✨ 工作时光' : '🌸 休息时刻', searchKw)}</span>
        <div class="flex gap-2">
          <div class="icon-btn btn-edit-romance" title="编辑记忆">
            <i class="fa fa-pencil"></i>
          </div>
          <div class="icon-btn btn-del-romance" title="删除记忆">
            <i class="fa fa-trash-o"></i>
          </div>
        </div>
      </div>
      <h4 class="text-base font-semibold mb-3 text-lavender-500">${highlight(item.title, searchKw)}</h4>
      <div class="flex justify-between items-center text-sm text-gray-400 mb-3">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
          <span>${highlight(item.start, searchKw)}</span>
        </div>
        <div class="text-sakura-300">→</div>
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-sakura-400"></span>
          <span>${highlight(item.end, searchKw)}</span>
        </div>
      </div>
      <div class="flex justify-between items-center pt-3 border-t border-sakura-100">
        <div class="text-xs text-lavender-300 flex items-center gap-1">
          <i class="fa fa-calendar"></i> ${highlight(item.date, searchKw)}
        </div>
        <div class="text-sakura-400 font-bold flex items-center gap-1">
          <i class="fa fa-clock-o"></i> ${item.duration}h
        </div>
      </div>
    </div>
    `;
  });
  listWrap.innerHTML = html;
}

listWrap.addEventListener("click", function (e) {
  const target = e.target;
  const card = target.closest(".card-romance");
  if (!card) return;
  const cardId = Number(card.dataset.id);

  if (target.closest(".btn-edit-romance")) {
    const list = getAll();
    const data = list.find(item => item.id === cardId);
    if (!data) return;
    $("#edit_id").value = data.id;
    $("#edit_date").value = data.date;
    $("#edit_title").value = data.title;
    $("#edit_start").value = data.start;
    $("#edit_end").value = data.end;
    editModal.classList.remove("hidden");
  }

  if (target.closest(".btn-del-romance")) {
    Swal.fire({
      title: '删除记忆？',
      text: '确定要删除这段美好的记忆吗？删除后无法恢复哦！',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '确定删除',
      cancelButtonText: '取消',
      confirmButtonColor: '#FF69B4',
      cancelButtonColor: '#9370DB',
      backdrop: 'rgba(255, 183, 197, 0.3)',
      customClass: {
        popup: 'glass-card rounded-xl',
        title: 'text-lavender-500',
        content: 'text-lavender-300'
      }
    }).then((result) => {
      if (result.isConfirmed) {
        const list = getAll();
        const newList = list.filter(item => item.id !== cardId);
        setAll(newList);
        render($("#searchInput").value.trim());
        statistics();
        showToast('记忆已删除', 'success');
      }
    });
  }
});

$("#addBtn").addEventListener("click", function () {
  const date = $("#r_date").value;
  const type = $("#r_type").value;
  const title = $("#r_title").value.trim();
  const start = $("#r_start").value;
  const end = $("#r_end").value;

  if (!date || !title || !start || !end) {
    showToast('请完整填写所有项哦！', 'error');
    return;
  }
  const duration = getDuration(start, end);
  if (duration <= 0) {
    showToast('结束时间必须晚于开始时间呢！', 'error');
    return;
  }

  const list = getAll();
  list.unshift({
    id: Date.now(),
    date,
    type,
    title,
    start,
    end,
    duration
  });
  setAll(list);

  $("#r_title").value = "";
  $("#r_start").value = "";
  $("#r_end").value = "";

  render();
  statistics();
  showToast('时光已珍藏 ✨');
});

$("#editCancel").addEventListener("click", function () {
  editModal.classList.add("hidden");
});

$("#editSave").addEventListener("click", function () {
  const targetId = Number($("#edit_id").value);
  const date = $("#edit_date").value;
  const title = $("#edit_title").value.trim();
  const start = $("#edit_start").value;
  const end = $("#edit_end").value;

  if (!date || !title || !start || !end) {
    showToast('请完整填写所有项哦！', 'error');
    return;
  }
  const duration = getDuration(start, end);
  if (duration <= 0) {
    showToast('时间设置有问题呢！', 'error');
    return;
  }

  const list = getAll().map(item => {
    if (item.id === targetId) {
      return { ...item, date, title, start, end, duration };
    }
    return item;
  });
  setAll(list);
  editModal.classList.add("hidden");

  render($("#searchInput").value.trim());
  statistics();
  showToast('记忆已更新 ✨');
});

$("#searchBtn").addEventListener("click", function () {
  render($("#searchInput").value.trim());
});
$("#searchInput").addEventListener("input", function () {
  render($("#searchInput").value.trim());
});

$("#hourWage").addEventListener("input", function () {
  setWage(this.value);
  statistics();
});

$("#clearAll").addEventListener("click", function () {
  Swal.fire({
    title: '清空所有回忆？',
    text: '确定要清空所有美好的回忆吗？该操作无法撤销！',
    icon: 'error',
    showCancelButton: true,
    confirmButtonText: '确定清空',
    cancelButtonText: '取消',
    confirmButtonColor: '#FF69B4',
    cancelButtonColor: '#9370DB',
    backdrop: 'rgba(255, 183, 197, 0.3)',
    customClass: {
      popup: 'glass-card rounded-xl',
      title: 'text-lavender-500',
      content: 'text-lavender-300'
    }
  }).then((result) => {
    if (result.isConfirmed) {
      setAll([]);
      render();
      statistics();
      showToast('回忆已清空', 'success');
    }
  });
});

window.addEventListener("load", function () {
  $("#r_date").value = fmtToday();
  $("#hourWage").value = getWage();
  render();
  statistics();

  lucide.createIcons();

  anime({
    targets: '.star-decoration',
    scale: [0, 1],
    opacity: [0, 1],
    delay: anime.stagger(200),
    duration: 1000,
    easing: 'easeOutElastic(1, .8)'
  });

  anime({
    targets: '.card-romance',
    translateY: [15, 0],
    opacity: [0, 1],
    delay: anime.stagger(80),
    duration: 600,
    easing: 'easeOutQuad'
  });

  anime({
    targets: '.stat-card',
    scale: [0.95, 1],
    opacity: [0, 1],
    delay: anime.stagger(100),
    duration: 500,
    easing: 'easeOutBack'
  });
});

</script>
</body>
