              100: '#E6E6FA',

  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 183, 197, 0.4);
        box-shadow: 0 8px 32px rgba(255, 183, 197, 0.15);

        position: relative;
        overflow: hidden;
      }
      .btn-romance::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;

        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.5s;
      }
      .btn-romance:hover::before {
        left: 100%;
      }
      .btn-romance:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(255, 105, 180, 0.6);

  </style>

<script>
const STORAGE_KEY = "star_anime_time_record";
const STORAGE_WAGE = "star_anime_hour_wage";
const $ = (s) => document.querySelector(s);
const listWrap = $("#listWrap");
const editModal = $("#editModal");

const getAll = () => JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
const setAll = (arr) => localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
const getWage = () => Number(localStorage.getItem(STORAGE_WAGE)) || 0;
const setWage = (val) => localStorage.setItem(STORAGE_WAGE, Number(val) || 0);

const fmtToday = () => new Date().toISOString().split("T")[0];

function getDuration(start, end) {
  if (!start || !end) return 0;
  let [sh, sm] = start.split(":").map(Number);
  let [eh, em] = end.split(":").map(Number);
  let sMin = sh * 60 + sm;
  let eMin = eh * 60 + em;
  let diff = eMin - sMin;
  return diff <= 0 ? 0 : Math.round((diff / 60) * 10) / 10;
}

function statistics() {
  const list = getAll();
  const hourWage = getWage();
  $("#totalCount").textContent = list.length;

  const totalWorkHour = list
    .filter(item => item.type === "上班")
    .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  
  $("#totalWorkHour").textContent = totalWorkHour.toFixed(1) + "h";
  const totalWage = totalWorkHour * hourWage;
  $("#totalWage").textContent = "¥" + totalWage.toFixed(2);
}

function highlight(text, kw) {
  if (!kw) return text;
  const reg = new RegExp(`(${kw})`, "gi");
  return text.replace(reg, '<span class="highlight-romance">$1</span>');
}

function render(searchKw = "") {
  const list = getAll().sort((a, b) => b.id - a.id);
  const empty = $("#empty");

  const filtered = searchKw
    ? list.filter(item =>
        item.date.includes(searchKw) ||
        item.start.includes(searchKw) ||
        item.end.includes(searchKw) ||
        item.title.includes(searchKw) ||
        item.type.includes(searchKw)
      )
    : list;

  if (filtered.length === 0) {
    listWrap.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  let html = "";
  filtered.forEach(item => {
    html += `
    <div class="card-romance" data-id="${item.id}">
      <div class="flex justify-between items-start mb-4">
        <span class="tag-romance text-xs px-4 py-2 rounded-full shadow-sm">${highlight(item.type === '上班' ? '✨ 工作时光' : '🌸 休息时刻', searchKw)}</span>
        <div class="flex gap-3">
          <div class="icon-btn btn-edit-romance" title="编辑记忆">
            <i class="fa fa-pencil"></i>
          </div>
          <div class="icon-btn btn-del-romance" title="删除记忆">
            <i class="fa fa-trash-o"></i>
          </div>
        </div>
      </div>
      <h4 class="text-lg font-semibold mb-4 text-lavender-500">${highlight(item.title, searchKw)}</h4>
      <div class="flex justify-between items-center text-sm text-gray-400 mb-4">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-400 shadow-sm"></span>
          <span>${highlight(item.start, searchKw)}</span>
        </div>
        <div class="text-sakura-300 text-lg">→</div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-sakura-400 shadow-sm"></span>
          <span>${highlight(item.end, searchKw)}</span>
        </div>
      </div>
      <div class="flex justify-between items-center pt-3 border-t border-sakura-100">
        <div class="text-xs text-lavender-300 flex items-center gap-1">
          <i class="fa fa-calendar"></i> ${highlight(item.date, searchKw)}
        </div>
        <div class="text-sakura-400 font-bold flex items-center gap-2">
          <i class="fa fa-clock-o"></i> ${item.duration}h
        </div>
      </div>
    </div>
    `;
  });
  listWrap.innerHTML = html;
}

listWrap.addEventListener("click", function (e) {
  const target = e.target;
  const card = target.closest(".card-romance");
  if (!card) return;
  const cardId = Number(card.dataset.id);

  if (target.closest(".btn-edit-romance")) {
    const list = getAll();
    const data = list.find(item => item.id === cardId);
    if (!data) return;
    $("#edit_id").value = data.id;
    $("#edit_date").value = data.date;
    $("#edit_title").value = data.title;
    $("#edit_start").value = data.start;
    $("#edit_end").value = data.end;
    editModal.classList.remove("hidden");
  }

  if (target.closest(".btn-del-romance")) {
    if (!confirm("确定要删除这段美好的记忆吗？删除后无法恢复哦！")) return;
    const list = getAll();
    const newList = list.filter(item => item.id !== cardId);
    setAll(newList);
    render($("#searchInput").value.trim());
    statistics();
  }
});

$("#addBtn").addEventListener("click", function () {
  const date = $("#r_date").value;
  const type = $("#r_type").value;
  const title = $("#r_title").value.trim();
  const start = $("#r_start").value;
  const end = $("#r_end").value;

  if (!date || !title || !start || !end) {
    alert("请完整填写所有项哦！");
    return;
  }
  const duration = getDuration(start, end);
  if (duration <= 0) {
    alert("结束时间必须晚于开始时间呢！");
    return;
  }

  const list = getAll();
  list.unshift({
    id: Date.now(),
    date,
    type,
    title,
    start,
    end,
    duration
  });
  setAll(list);

  $("#r_title").value = "";
  $("#r_start").value = "";
  $("#r_end").value = "";

  render();
  statistics();
});

$("#editCancel").addEventListener("click", function () {
  editModal.classList.add("hidden");
});

$("#editSave").addEventListener("click", function () {
  const targetId = Number($("#edit_id").value);
  const date = $("#edit_date").value;
  const title = $("#edit_title").value.trim();
  const start = $("#edit_start").value;
  const end = $("#edit_end").value;

  if (!date || !title || !start || !end) {
    alert("请完整填写所有项哦！");
    return;
  }
  const duration = getDuration(start, end);
  if (duration <= 0) {
    alert("时间设置有问题呢！");
    return;
  }

  const list = getAll().map(item => {
    if (item.id === targetId) {
      return { ...item, date, title, start, end, duration };
    }
    return item;
  });
  setAll(list);
  editModal.classList.add("hidden");

  render($("#searchInput").value.trim());
  statistics();
});

$("#searchBtn").addEventListener("click", function () {
  render($("#searchInput").value.trim());
});
$("#searchInput").addEventListener("input", function () {
  render($("#searchInput").value.trim());
});

$("#hourWage").addEventListener("input", function () {
  setWage(this.value);
  statistics();
});

$("#clearAll").addEventListener("click", function () {
  if (!confirm("⚠️ 确定要清空所有美好的回忆吗？该操作无法撤销哦！")) return;
  setAll([]);
  render();
  statistics();
});

window.addEventListener("load", function () {
  $("#r_date").value = fmtToday();
  $("#hourWage").value = getWage();
  render();
  statistics();
});

</script>
</body>
</html>
