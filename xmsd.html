<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>『星漫时段工时』</title>
  <!-- Tailwind CSS -->
  <script src="assets/js/tailwind.min.js"></script>
  <!-- Font Awesome 4.7 -->
  <link href="assets/css/font-awesome.min.css" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="assets/js/lucide.min.js"></script>
  <!-- Chart.js -->
  <script src="assets/js/chart.umd.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="assets/js/sweetalert2.all.min.js"></script>
  <!-- Anime.js -->
  <script src="assets/js/anime.min.js"></script>
  <!-- Flowbite CSS/JS -->
  <link href="assets/css/flowbite.min.css" rel="stylesheet">
  <script src="assets/js/flowbite.min.js"></script>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
  <!-- Phosphor Icons -->
  <script src="assets/js/phosphor-icons.min.js"></script>
  <!-- SweetAlert2 CSS -->
  <link href="assets/css/sweetalert2.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sakura: {
              50: '#FFF0F5',
              100: '#FFE4E1',
              200: '#FFC0CB',
              300: '#FFB7C5',
              400: '#FF69B4',
              500: '#FF1493',
            },
            lavender: {
              50: '#F0F0FF',
              100: '#E6E6FA',
              200: '#D8BFD8',
              300: '#9370DB',
              400: '#8A2BE2',
              500: '#4B0082',
            },
            starlight: {
              gold: '#FFD700',
              pink: '#FF69B4',
              blue: '#87CEEB',
              purple: '#9370DB',
            }
          },
          fontFamily: {
            anime: ['"ZCOOL KuaiLe"', '"Ma Shan Zheng"', 'Segoe UI', 'sans-serif']
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'float-slow': 'float 4s ease-in-out infinite',
            'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
            'sparkle': 'sparkle 1.5s ease-in-out infinite',
            'sakura-fall': 'sakura-fall 12s linear infinite',
            'heart-beat': 'heart-beat 1s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            'pulse-glow': {
              '0%, 100%': { boxShadow: '0 0 20px rgba(255, 183, 197, 0.5), 0 0 40px rgba(147, 112, 219, 0.3)' },
              '50%': { boxShadow: '0 0 40px rgba(255, 183, 197, 0.8), 0 0 60px rgba(147, 112, 219, 0.5)' },
            },
            sparkle: {
              '0%, 100%': { opacity: '1', transform: 'scale(1)' },
              '50%': { opacity: '0.6', transform: 'scale(1.3)' },
            },
            'sakura-fall': {
              '0%': { transform: 'translateY(-10vh) rotate(0deg) translateX(0)', opacity: '1' },
              '25%': { transform: 'translateY(25vh) rotate(90deg) translateX(20px)', opacity: '0.9' },
              '50%': { transform: 'translateY(50vh) rotate(180deg) translateX(-10px)', opacity: '0.8' },
              '75%': { transform: 'translateY(75vh) rotate(270deg) translateX(15px)', opacity: '0.5' },
              '100%': { transform: 'translateY(100vh) rotate(360deg) translateX(0)', opacity: '0' },
            },
            'heart-beat': {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.1)' },
            },
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 183, 197, 0.25);
        box-shadow: 0 8px 32px rgba(255, 183, 197, 0.1);
      }
      .glass-card-dark {
        background: rgba(240, 240, 255, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(147, 112, 219, 0.2);
        box-shadow: 0 8px 32px rgba(147, 112, 219, 0.08);
      }
      .btn-romance {
        background: linear-gradient(135deg, #FFB7C5 0%, #FF69B4 50%, #9370DB 100%);
        box-shadow: 0 4px 20px rgba(255, 105, 180, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-romance::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        transition: left 0.5s;
      }
      .btn-romance:hover::before {
        left: 100%;
      }
      .btn-romance:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 28px rgba(255, 105, 180, 0.5);
      }
      .stat-card {
        background: linear-gradient(145deg, rgba(255, 248, 250, 0.92) 0%, rgba(245, 240, 255, 0.92) 100%);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 183, 197, 0.2);
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(255, 183, 197, 0.08);
        position: relative;
        overflow: hidden;
      }
      .stat-card::after {
        content: '';
        position: absolute;
        top: -50%;
        right: -50%;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(255, 183, 197, 0.15) 0%, transparent 70%);
        pointer-events: none;
      }
      .tag-romance {
        background: linear-gradient(135deg, rgba(255, 228, 225, 0.8) 0%, rgba(230, 230, 250, 0.8) 100%);
        color: #4B0082;
        border: 1px solid rgba(255, 183, 197, 0.25);
      }
      .highlight-romance {
        background: linear-gradient(135deg, #FFD700 0%, #FF69B4 100%);
        color: #4B0082;
        padding: 2px 8px;
        border-radius: 8px;
        font-weight: bold;
      }
      .card-romance {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 183, 197, 0.25);
        box-shadow: 0 8px 32px rgba(255, 183, 197, 0.1);
        border-radius: 1.25rem;
        padding: 1.25rem;
        transition: all 0.5s;
      }
      .card-romance:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      .input-romance {
        border-radius: 0.75rem;
        border: none;
        padding: 0.875rem 1rem;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        outline: none;
        transition: all;
      }
      .input-romance:focus {
        box-shadow: 0 0 0 3px rgba(255, 183, 197, 0.2);
      }
      .icon-btn {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        cursor: pointer;
      }
      .btn-edit-romance {
        background: rgba(240, 240, 255, 0.8);
        color: #9370DB;
      }
      .btn-edit-romance:hover {
        background: rgba(147, 112, 219, 0.8);
        color: white;
      }
      .btn-del-romance {
        background: rgba(255, 240, 245, 0.8);
        color: #FF69B4;
      }
      .btn-del-romance:hover {
        background: rgba(255, 105, 180, 0.8);
        color: white;
      }
      .star-decoration {
        position: absolute;
        font-size: 12px;
        color: #FFD700;
        animation: sparkle 1.5s ease-in-out infinite;
        text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
      }
      .sakura-petal {
        position: absolute;
        font-size: 14px;
        color: #FFB7C5;
        opacity: 0.7;
        pointer-events: none;
      }
      .heart-decoration {
        position: absolute;
        font-size: 10px;
        color: #FF69B4;
        animation: heart-beat 1.5s ease-in-out infinite;
        opacity: 0.5;
      }
      .divider-line {
        position: relative;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, rgba(255, 183, 197, 0.3) 50%, transparent 100%);
      }
      .nav-item {
        transition: all 0.3s;
      }
      .nav-item.active {
        color: #FF69B4;
      }
      .nav-item.active .nav-icon {
        background: linear-gradient(135deg, #FFB7C5 0%, #FF69B4 100%);
        color: white;
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
      }
      .sidebar-nav-item {
        color: #9370DB;
        background: transparent;
      }
      .sidebar-nav-item:hover {
        background: rgba(255, 183, 197, 0.15);
        color: #FF69B4;
      }
      .sidebar-nav-item.active {
        background: linear-gradient(135deg, rgba(255, 183, 197, 0.3) 0%, rgba(147, 112, 219, 0.3) 100%);
        color: #FF69B4;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
      }
      .sidebar-nav-item.active .nav-icon {
        background: linear-gradient(135deg, #FF69B4 0%, #9370DB 100%);
        color: white;
        box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
      }
      .sidebar-nav-item .nav-icon {
        background: rgba(255, 183, 197, 0.2);
        color: #9370DB;
      }
      .mobile-nav-item {
        color: #9370DB;
      }
      .mobile-nav-item:hover {
        color: #FF69B4;
      }
      .mobile-nav-item.active {
        color: #FF69B4;
      }
      .mobile-nav-item.active .nav-icon {
        background: linear-gradient(135deg, #FFB7C5 0%, #FF69B4 100%);
        color: white;
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
      }
      .mobile-nav-item .nav-icon {
        background: rgba(255, 183, 197, 0.2);
      }
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .app-container {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }
      .scroll-container {
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }
      .scroll-container::-webkit-scrollbar {
        display: none;
      }
      .fab-button {
        position: fixed;
        bottom: 5rem;
        right: 1.5rem;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 9999px;
        background: linear-gradient(135deg, #FF69B4 0%, #9370DB 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 24px rgba(255, 105, 180, 0.5);
        cursor: pointer;
        transition: all 0.3s;
        z-index: 40;
      }
      .fab-button:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 32px rgba(255, 105, 180, 0.6);
      }
      .fab-button:active {
        transform: scale(0.95);
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-sakura-50 via-white to-lavender-50 min-h-screen font-anime text-lavender-500 overflow-hidden">
  <!-- Background Decorations -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
    <div class="star-decoration hidden lg:block" style="top: 10%; left: 15%; animation-delay: 0s;">✦</div>
    <div class="star-decoration hidden lg:block" style="top: 25%; left: 92%; animation-delay: 0.5s;">✧</div>
    <div class="star-decoration hidden lg:block" style="top: 40%; left: 18%; animation-delay: 1.1s;">✦</div>
    <div class="star-decoration hidden lg:block" style="top: 55%; left: 88%; animation-delay: 0.8s;">✧</div>
    <div class="sakura-petal animate-sakura-fall hidden lg:block" style="top: -5%; left: 15%; animation-delay: 0s; font-size: 18px;">🌸</div>
    <div class="sakura-petal animate-sakura-fall hidden lg:block" style="top: -5%; left: 45%; animation-delay: 4s; font-size: 16px;">🌸</div>
    <div class="sakura-petal animate-sakura-fall hidden lg:block" style="top: -5%; left: 75%; animation-delay: 8s; font-size: 17px;">🌸</div>
  </div>

  <!-- Desktop Sidebar -->
  <aside class="hidden lg:flex lg:flex-col fixed left-0 top-0 bottom-0 w-64 bg-white/95 backdrop-blur-xl border-r border-sakura-100/50 z-50 shadow-xl">
    <!-- Logo Area -->
    <div class="h-20 flex items-center justify-center border-b border-sakura-100/50">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl btn-romance flex items-center justify-center shadow-md">
          <i class="ph ph-hourglass-medium text-white text-xl"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold bg-gradient-to-r from-sakura-400 via-lavender-300 to-sakura-400 bg-clip-text text-transparent">
            星漫时段
          </h1>
          <p class="text-xs text-lavender-300">记录美好时光</p>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-4 space-y-2">
      <button class="sidebar-nav-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-300" data-page="home">
        <div class="nav-icon w-10 h-10 rounded-xl flex items-center justify-center transition-all">
          <i class="bi bi-house-door text-lg"></i>
        </div>
        <span class="font-medium">首页</span>
      </button>
      <button class="sidebar-nav-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-300" data-page="add">
        <div class="nav-icon w-10 h-10 rounded-xl flex items-center justify-center transition-all">
          <i class="ti ti-plus text-lg"></i>
        </div>
        <span class="font-medium">记录</span>
      </button>
      <button class="sidebar-nav-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-300" data-page="settings">
        <div class="nav-icon w-10 h-10 rounded-xl flex items-center justify-center transition-all">
          <i class="tabler-icon-settings text-lg"></i>
        </div>
        <span class="font-medium">设置</span>
      </button>
    </nav>

    <!-- Footer -->
    <div class="p-4 border-t border-sakura-100/50">
      <p class="text-xs text-lavender-300 text-center">
        <i class="ph ph-heart text-sakura-400"></i> 愿每一段时光都美好
      </p>
    </div>
  </aside>

  <!-- Mobile Header -->
  <header class="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white/95 backdrop-blur-lg border-b border-sakura-100/50 flex items-center justify-center z-50">
    <div class="flex items-center gap-2">
      <i class="ph ph-hourglass-medium text-sakura-400"></i>
      <span class="text-base font-bold bg-gradient-to-r from-sakura-400 to-lavender-300 bg-clip-text text-transparent">星漫时段</span>
    </div>
  </header>

  <!-- App Container -->
  <div class="lg:ml-64 pt-14 lg:pt-0 h-screen h-dvh flex flex-col">
    <!-- Main Content Area -->
    <main id="mainContent" class="flex-1 scroll-container pb-20 lg:pb-6">
      <div class="px-4 py-6 max-w-5xl mx-auto">
        <!-- Home Page -->
        <div id="homePage">
          <!-- Stats Cards -->
          <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="stat-card p-4 text-center transform hover:scale-105 transition-transform duration-300">
              <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-sakura-200 to-sakura-300 shadow-sm mb-2">
                <i class="ph ph-notepad text-white text-lg"></i>
              </div>
              <p class="text-xs text-lavender-300 mb-0.5">记忆</p>
              <p id="totalCount" class="text-lg font-bold text-lavender-500">0</p>
            </div>
            <div class="stat-card p-4 text-center transform hover:scale-105 transition-transform duration-300">
              <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-blue-200 to-lavender-300 shadow-sm mb-2">
                <i class="ph ph-clock text-white text-lg"></i>
              </div>
              <p class="text-xs text-lavender-300 mb-0.5">工时</p>
              <p id="totalWorkHour" class="text-lg font-bold text-lavender-500">0h</p>
            </div>
            <div class="stat-card p-4 text-center transform hover:scale-105 transition-transform duration-300">
              <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-amber-200 to-sakura-300 shadow-sm mb-2">
                <i class="ph ph-coins text-white text-lg"></i>
              </div>
              <p class="text-xs text-lavender-300 mb-0.5">收入</p>
              <p id="totalWage" class="text-lg font-bold text-lavender-500">¥0</p>
            </div>
          </div>

          <!-- Today's Summary -->
          <div class="glass-card rounded-2xl p-4 mb-6">
            <h3 class="text-sm font-semibold text-lavender-500 mb-3 flex items-center gap-2">
              <i class="ph ph-sun text-sakura-400"></i> 今日概览
            </h3>
            <div class="grid grid-cols-3 gap-3">
              <div class="text-center">
                <p class="text-2xl font-bold text-lavender-500" id="todayCount">0</p>
                <p class="text-xs text-lavender-300">记录</p>
              </div>
              <div class="text-center">
                <p class="text-2xl font-bold text-sakura-400" id="todayHours">0h</p>
                <p class="text-xs text-lavender-300">工时</p>
              </div>
              <div class="text-center">
                <p class="text-2xl font-bold text-amber-500" id="todayWage">¥0</p>
                <p class="text-xs text-lavender-300">收入</p>
              </div>
            </div>
          </div>

          <!-- Chart Section -->
          <div class="glass-card rounded-2xl p-4 mb-6">
            <h3 class="text-sm font-semibold text-lavender-500 mb-3 flex items-center gap-2">
              <i class="ph ph-chart-bar text-sakura-400"></i> 工时图表
            </h3>
            <div class="h-48">
              <canvas id="workChart"></canvas>
            </div>
          </div>

          <!-- Recent Records -->
          <div>
            <h2 class="text-base font-bold text-lavender-500 mb-4 flex items-center gap-2">
              <i class="ph ph-books text-sakura-400"></i> 时光回忆录
            </h2>
            <div id="listWrap" class="space-y-4"></div>
            <div id="empty" class="text-center py-12">
              <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-sakura-50 to-lavender-50 shadow-sm mb-3">
                <i class="ph ph-cloud text-sakura-300 text-3xl"></i>
              </div>
              <p class="text-lavender-300 mb-1">还没有回忆...</p>
              <p class="text-xs text-sakura-400">点击左侧导航开始记录 🌸</p>
            </div>
          </div>
        </div>

        <!-- Add Page -->
        <div id="addPage" class="hidden">
          <div class="glass-card-dark rounded-2xl p-5">
            <div class="text-center mb-5">
              <h2 class="text-base font-bold text-lavender-500">
                <i class="ph ph-sparkle text-sakura-400"></i> 记录新时光
              </h2>
            </div>
            
            <div class="space-y-4">
              <div>
                <label for="r_date" class="block text-xs text-lavender-300 mb-1.5">
                  <i class="ph ph-calendar text-sakura-400 mr-1"></i>日期
                </label>
                <input type="date" id="r_date" class="input-romance w-full">
              </div>
              
              <div>
                <label for="r_type" class="block text-xs text-lavender-300 mb-1.5">
                  <i class="ph ph-tag text-sakura-400 mr-1"></i>类型
                </label>
                <select id="r_type" class="input-romance w-full appearance-none">
                  <option value="上班">✨ 工作时光</option>
                  <option value="休息">🌸 休息时刻</option>
                </select>
              </div>
              
              <div>
                <label for="r_title" class="block text-xs text-lavender-300 mb-1.5">
                  <i class="ph ph-note text-sakura-400 mr-1"></i>事项
                </label>
                <input type="text" id="r_title" placeholder="今天发生了什么..." class="input-romance w-full">
              </div>
              
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label for="r_start" class="block text-xs text-lavender-300 mb-1.5">
                    <i class="ph ph-play text-sakura-400 mr-1"></i>开始
                  </label>
                  <input type="time" id="r_start" class="input-romance w-full">
                </div>
                <div>
                  <label for="r_end" class="block text-xs text-lavender-300 mb-1.5">
                    <i class="ph ph-stop-circle text-sakura-400 mr-1"></i>结束
                  </label>
                  <input type="time" id="r_end" class="input-romance w-full">
                </div>
              </div>
              
              <button id="addBtn" class="w-full btn-romance text-white rounded-xl py-3.5 font-medium transition-all flex items-center justify-center gap-2">
                <i class="ph ph-heart"></i> 珍藏这段时光
              </button>
            </div>
          </div>
        </div>

        <!-- Settings Page -->
        <div id="settingsPage" class="hidden">
          <div class="glass-card rounded-2xl p-5 mb-4">
            <h3 class="text-sm font-semibold text-lavender-400 mb-4 flex items-center gap-2">
              <i class="ph ph-currency-circle-dollar text-sakura-400"></i> 设置
            </h3>
            <div class="relative mb-4">
              <label class="block text-xs text-lavender-300 mb-2">每小时心动值</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                  <i class="ph ph-yen text-lavender-300 text-sm"></i>
                </div>
                <input id="hourWage" type="number" placeholder="0" class="w-full pl-8 bg-white/60 rounded-xl px-3 py-3 text-base text-lavender-500 placeholder-lavender-300 outline-none focus:ring-2 focus:ring-sakura-300/40 transition-all">
              </div>
              <span class="text-xs text-lavender-300 mt-1 block">¥/小时</span>
            </div>
          </div>

          <div class="glass-card rounded-2xl p-5 mb-4">
            <h3 class="text-sm font-semibold text-lavender-400 mb-4 flex items-center gap-2">
              <i class="ph ph-magnifying-glass text-sakura-400"></i> 搜索
            </h3>
            <div class="relative mb-3">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <i class="ph ph-magnifying-glass text-lavender-300 text-sm"></i>
              </div>
              <input id="searchInput" type="text" placeholder="搜索回忆..." class="w-full pl-8 bg-white/60 rounded-xl px-3 py-3 text-sm text-lavender-500 placeholder-lavender-300 outline-none focus:ring-2 focus:ring-sakura-300/40 transition-all">
            </div>
            <button id="searchBtn" class="w-full btn-romance text-white rounded-xl py-2.5 text-sm font-medium transition-all">
              搜索
            </button>
          </div>

          <div class="glass-card rounded-2xl p-5">
            <h3 class="text-sm font-semibold text-lavender-400 mb-4 flex items-center gap-2">
              <i class="ti ti-alert-triangle text-sakura-400"></i> 危险操作
            </h3>
            <button id="clearAll" class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-red-50 text-red-400 hover:bg-red-100 transition-all text-sm">
              <i class="ti ti-trash"></i>清空所有回忆
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Navigation -->
  <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-sakura-100/50 safe-area-bottom z-50">
    <div class="flex items-center justify-around py-2">
      <button class="mobile-nav-item active flex flex-col items-center py-2 px-4" data-page="home">
        <div class="nav-icon w-12 h-12 rounded-2xl flex items-center justify-center mb-1 transition-all">
          <i class="ph ph-house text-lg"></i>
        </div>
        <span class="text-xs">首页</span>
      </button>
      <button class="mobile-nav-item flex flex-col items-center py-2 px-4" data-page="add">
        <div class="nav-icon w-12 h-12 rounded-2xl flex items-center justify-center mb-1 transition-all">
          <i class="ph ph-plus-circle text-lg"></i>
        </div>
        <span class="text-xs">记录</span>
      </button>
      <button class="mobile-nav-item flex flex-col items-center py-2 px-4" data-page="settings">
        <div class="nav-icon w-12 h-12 rounded-2xl flex items-center justify-center mb-1 transition-all">
          <i class="ph ph-gear text-lg"></i>
        </div>
        <span class="text-xs">设置</span>
      </button>
    </div>
  </nav>

  <!-- Floating Action Button (Desktop only) -->
  <button id="fabAdd" class="hidden lg:flex fixed top-6 right-6 w-14 h-14 rounded-full btn-romance items-center justify-center shadow-lg z-40">
    <i class="ph ph-plus text-xl"></i>
  </button>

  <!-- Edit Modal -->
  <div id="editModal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/30 backdrop-blur-sm"></div>
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="flex min-h-full items-center justify-center p-4">
        <div class="relative w-full max-w-sm">
          <div class="glass-card rounded-2xl p-6 shadow-2xl">
            <div class="text-center mb-5">
              <h3 class="text-base font-bold text-lavender-500">
                <i class="ph ph-pencil-simple text-sakura-400"></i> 编辑记忆
              </h3>
            </div>
            <input type="hidden" id="edit_id">
            <div class="space-y-4">
              <div>
                <label for="edit_date" class="block text-xs text-lavender-300 mb-1.5">
                  <i class="ph ph-calendar text-sakura-400 mr-1"></i>日期
                </label>
                <input type="date" id="edit_date" class="input-romance w-full">
              </div>
              <div>
                <label for="edit_title" class="block text-xs text-lavender-300 mb-1.5">
                  <i class="ph ph-note text-sakura-400 mr-1"></i>事项
                </label>
                <input type="text" id="edit_title" class="input-romance w-full" placeholder="美好的回忆...">
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label for="edit_start" class="block text-xs text-lavender-300 mb-1.5">
                    <i class="ph ph-play text-sakura-400 mr-1"></i>开始
                  </label>
                  <input type="time" id="edit_start" class="input-romance w-full">
                </div>
                <div>
                  <label for="edit_end" class="block text-xs text-lavender-300 mb-1.5">
                    <i class="ph ph-stop-circle text-sakura-400 mr-1"></i>结束
                  </label>
                  <input type="time" id="edit_end" class="input-romance w-full">
                </div>
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button id="editCancel" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all text-sm">
                <i class="ph ph-x mr-1"></i>取消
              </button>
              <button id="editSave" class="flex-1 py-3 rounded-xl btn-romance text-white transition-all text-sm">
                <i class="ph ph-check mr-1"></i>保存
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const STORAGE_KEY = "star_anime_time_record";
const STORAGE_WAGE = "star_anime_hour_wage";
const $ = (s) => document.querySelector(s);
const listWrap = $("#listWrap");
const editModal = $("#editModal");
let workChart = null;

const getAll = () => JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
const setAll = (arr) => localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
const getWage = () => Number(localStorage.getItem(STORAGE_WAGE)) || 0;
const setWage = (val) => localStorage.setItem(STORAGE_WAGE, Number(val) || 0);

const fmtToday = () => new Date().toISOString().split("T")[0];

function showToast(message, type = 'success') {
  Swal.fire({
    toast: true,
    position: 'top',
    icon: type,
    title: message,
    showConfirmButton: false,
    timer: 2000,
    backdrop: false,
    customClass: {
      popup: 'glass-card rounded-xl',
      title: 'text-lavender-500'
    }
  });
}

function getDuration(start, end) {
  if (!start || !end) return 0;
  let [sh, sm] = start.split(":").map(Number);
  let [eh, em] = end.split(":").map(Number);
  let sMin = sh * 60 + sm;
  let eMin = eh * 60 + em;
  let diff = eMin - sMin;
  return diff <= 0 ? 0 : Math.round((diff / 60) * 10) / 10;
}

function statistics() {
  const list = getAll();
  const hourWage = getWage();
  $("#totalCount").textContent = list.length;

  const totalWorkHour = list
    .filter(item => item.type === "上班")
    .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  
  $("#totalWorkHour").textContent = totalWorkHour.toFixed(1) + "h";
  const totalWage = totalWorkHour * hourWage;
  $("#totalWage").textContent = "¥" + totalWage.toFixed(0);

  const today = fmtToday();
  const todayList = list.filter(item => item.date === today);
  $("#todayCount").textContent = todayList.length;
  const todayWorkHour = todayList
    .filter(item => item.type === "上班")
    .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  $("#todayHours").textContent = todayWorkHour.toFixed(1) + "h";
  $("#todayWage").textContent = "¥" + (todayWorkHour * hourWage).toFixed(0);

  renderChart(list);
}

function renderChart(list) {
  const ctx = document.getElementById('workChart');
  if (!ctx) return;

  const last7Days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    last7Days.push(d.toISOString().split("T")[0]);
  }

  const workData = last7Days.map(date => {
    return list
      .filter(item => item.date === date && item.type === "上班")
      .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  });

  const restData = last7Days.map(date => {
    return list
      .filter(item => item.date === date && item.type === "休息")
      .reduce((sum, item) => sum + Number(item.duration || 0), 0);
  });

  const labels = last7Days.map(date => {
    const d = new Date(date);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  });

  if (workChart) {
    workChart.destroy();
  }

  workChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: '工作时长',
          data: workData,
          backgroundColor: 'rgba(255, 105, 180, 0.65)',
          borderRadius: 6,
        },
        {
          label: '休息时长',
          data: restData,
          backgroundColor: 'rgba(147, 112, 219, 0.65)',
          borderRadius: 6,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#4B0082',
            font: {
              family: '"ZCOOL KuaiLe", sans-serif'
            },
            padding: 16,
            usePointStyle: true
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: {
            color: 'rgba(255, 183, 197, 0.15)'
          },
          ticks: {
            color: '#4B0082'
          }
        },
        x: {
          grid: {
            display: false
          },
          ticks: {
            color: '#4B0082'
          }
        }
      }
    }
  });
}

function highlight(text, kw) {
  if (!kw) return text;
  const reg = new RegExp(`(${kw})`, "gi");
  return text.replace(reg, '<span class="highlight-romance">$1</span>');
}

function render(searchKw = "") {
  const list = getAll().sort((a, b) => b.id - a.id);
  const empty = $("#empty");

  const filtered = searchKw
    ? list.filter(item =>
        item.date.includes(searchKw) ||
        item.start.includes(searchKw) ||
        item.end.includes(searchKw) ||
        item.title.includes(searchKw) ||
        item.type.includes(searchKw)
      )
    : list;

  if (filtered.length === 0) {
    listWrap.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  let html = "";
  filtered.forEach(item => {
    html += `
    <div class="card-romance" data-id="${item.id}">
      <div class="flex justify-between items-start mb-3">
        <span class="tag-romance text-xs px-3 py-1.5 rounded-full">${highlight(item.type === '上班' ? '✨ 工作' : '🌸 休息', searchKw)}</span>
        <div class="flex gap-2">
          <div class="icon-btn btn-edit-romance" title="编辑">
            <i class="ph ph-pencil-simple text-xs"></i>
          </div>
          <div class="icon-btn btn-del-romance" title="删除">
            <i class="ph ph-trash text-xs"></i>
          </div>
        </div>
      </div>
      <h4 class="text-sm font-semibold mb-2 text-lavender-500">${highlight(item.title, searchKw)}</h4>
      <div class="flex justify-between items-center text-xs text-gray-400 mb-2">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-400"></span>
          <span>${highlight(item.start, searchKw)}</span>
        </div>
        <div class="text-sakura-300">→</div>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-sakura-400"></span>
          <span>${highlight(item.end, searchKw)}</span>
        </div>
      </div>
      <div class="flex justify-between items-center pt-2 border-t border-sakura-100">
        <div class="text-xs text-lavender-300 flex items-center gap-1">
          <i class="ph ph-calendar"></i> ${highlight(item.date, searchKw)}
        </div>
        <div class="text-sakura-400 font-bold text-sm flex items-center gap-1">
          <i class="ph ph-clock"></i> ${item.duration}h
        </div>
      </div>
    </div>
    `;
  });
  listWrap.innerHTML = html;
}

listWrap.addEventListener("click", function (e) {
  const target = e.target;
  const card = target.closest(".card-romance");
  if (!card) return;
  const cardId = Number(card.dataset.id);

  if (target.closest(".btn-edit-romance")) {
    const list = getAll();
    const data = list.find(item => item.id === cardId);
    if (!data) return;
    $("#edit_id").value = data.id;
    $("#edit_date").value = data.date;
    $("#edit_title").value = data.title;
    $("#edit_start").value = data.start;
    $("#edit_end").value = data.end;
    editModal.classList.remove("hidden");
  }

  if (target.closest(".btn-del-romance")) {
    Swal.fire({
      title: '删除记忆？',
      text: '确定要删除这段美好的记忆吗？',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '确定删除',
      cancelButtonText: '取消',
      confirmButtonColor: '#FF69B4',
      cancelButtonColor: '#9370DB',
      backdrop: 'rgba(255, 183, 197, 0.3)',
      customClass: {
        popup: 'glass-card rounded-xl',
        title: 'text-lavender-500',
        content: 'text-lavender-300'
      }
    }).then((result) => {
      if (result.isConfirmed) {
        const list = getAll();
        const newList = list.filter(item => item.id !== cardId);
        setAll(newList);
        render($("#searchInput").value.trim());
        statistics();
        showToast('记忆已删除', 'success');
      }
    });
  }
});

$("#addBtn").addEventListener("click", function () {
  const date = $("#r_date").value;
  const type = $("#r_type").value;
  const title = $("#r_title").value.trim();
  const start = $("#r_start").value;
  const end = $("#r_end").value;

  if (!date || !title || !start || !end) {
    showToast('请完整填写所有项哦！', 'error');
    return;
  }
  const duration = getDuration(start, end);
  if (duration <= 0) {
    showToast('结束时间必须晚于开始时间呢！', 'error');
    return;
  }

  const list = getAll();
  list.unshift({
    id: Date.now(),
    date,
    type,
    title,
    start,
    end,
    duration
  });
  setAll(list);

  $("#r_title").value = "";
  $("#r_start").value = "";
  $("#r_end").value = "";

  render();
  statistics();
  showToast('时光已珍藏 ✨');
  
  // Switch to home page after adding
  switchPage('home');
});

$("#editCancel").addEventListener("click", function () {
  editModal.classList.add("hidden");
});

$("#editSave").addEventListener("click", function () {
  const targetId = Number($("#edit_id").value);
  const date = $("#edit_date").value;
  const title = $("#edit_title").value.trim();
  const start = $("#edit_start").value;
  const end = $("#edit_end").value;

  if (!date || !title || !start || !end) {
    showToast('请完整填写所有项哦！', 'error');
    return;
  }
  const duration = getDuration(start, end);
  if (duration <= 0) {
    showToast('时间设置有问题呢！', 'error');
    return;
  }

  const list = getAll().map(item => {
    if (item.id === targetId) {
      return { ...item, date, title, start, end, duration };
    }
    return item;
  });
  setAll(list);
  editModal.classList.add("hidden");

  render($("#searchInput").value.trim());
  statistics();
  showToast('记忆已更新 ✨');
});

$("#searchBtn").addEventListener("click", function () {
  const kw = $("#searchInput").value.trim();
  render(kw);
  switchPage('home');
});

$("#searchInput").addEventListener("input", function () {
  render($("#searchInput").value.trim());
});

$("#hourWage").addEventListener("input", function () {
  setWage(this.value);
  statistics();
});

$("#clearAll").addEventListener("click", function () {
  Swal.fire({
    title: '清空所有回忆？',
    text: '确定要清空所有美好的回忆吗？该操作无法撤销！',
    icon: 'error',
    showCancelButton: true,
    confirmButtonText: '确定清空',
    cancelButtonText: '取消',
    confirmButtonColor: '#FF69B4',
    cancelButtonColor: '#9370DB',
    backdrop: 'rgba(255, 183, 197, 0.3)',
    customClass: {
      popup: 'glass-card rounded-xl',
      title: 'text-lavender-500',
      content: 'text-lavender-300'
    }
  }).then((result) => {
    if (result.isConfirmed) {
      setAll([]);
      render();
      statistics();
      showToast('回忆已清空', 'success');
    }
  });
});

// Navigation
function switchPage(page) {
  const desktopNavItems = document.querySelectorAll('.sidebar-nav-item');
  const mobileNavItems = document.querySelectorAll('.mobile-nav-item');
  const homePage = $("#homePage");
  const addPage = $("#addPage");
  const settingsPage = $("#settingsPage");
  const fab = $("#fabAdd");

  // Remove active from all nav items
  desktopNavItems.forEach(item => item.classList.remove('active'));
  mobileNavItems.forEach(item => item.classList.remove('active'));
  
  // Hide all pages
  homePage.classList.add('hidden');
  addPage.classList.add('hidden');
  settingsPage.classList.add('hidden');
  
  // Show FAB by default (hidden on add/settings pages)
  fab.classList.add('hidden');
  if (window.innerWidth >= 1024) {
    fab.classList.remove('hidden');
  }

  // Show the selected page and activate nav item
  if (page === 'home') {
    homePage.classList.remove('hidden');
    desktopNavItems[0]?.classList.add('active');
    mobileNavItems[0]?.classList.add('active');
  } else if (page === 'add') {
    addPage.classList.remove('hidden');
    desktopNavItems[1]?.classList.add('active');
    mobileNavItems[1]?.classList.add('active');
  } else if (page === 'settings') {
    settingsPage.classList.remove('hidden');
    desktopNavItems[2]?.classList.add('active');
    mobileNavItems[2]?.classList.add('active');
  }
  
  // Scroll to top
  $("#mainContent").scrollTop = 0;
}

// Desktop sidebar navigation
document.querySelectorAll('.sidebar-nav-item').forEach(item => {
  item.addEventListener("click", function() {
    const page = this.dataset.page;
    switchPage(page);
  });
});

// Mobile bottom navigation
document.querySelectorAll('.mobile-nav-item').forEach(item => {
  item.addEventListener("click", function() {
    const page = this.dataset.page;
    switchPage(page);
  });
});

$("#fabAdd").addEventListener("click", function() {
  switchPage('add');
});

// Handle window resize
window.addEventListener('resize', function() {
  if (window.innerWidth >= 1024) {
    $("#fabAdd").classList.remove('hidden');
  } else {
    // Hide FAB on mobile when on certain pages
    const addPage = $("#addPage");
    const settingsPage = $("#settingsPage");
    if (!addPage.classList.contains('hidden') || !settingsPage.classList.contains('hidden')) {
      $("#fabAdd").classList.add('hidden');
    }
  }
});

window.addEventListener("load", function () {
  $("#r_date").value = fmtToday();
  $("#hourWage").value = getWage();
  render();
  statistics();

  anime({
    targets: '.star-decoration',
    scale: [0, 1],
    opacity: [0, 1],
    delay: anime.stagger(200),
    duration: 1000,
    easing: 'easeOutElastic(1, .8)'
  });

  anime({
    targets: '.card-romance',
    translateY: [15, 0],
    opacity: [0, 1],
    delay: anime.stagger(80),
    duration: 600,
    easing: 'easeOutQuad'
  });

  anime({
    targets: '.stat-card',
    scale: [0.95, 1],
    opacity: [0, 1],
    delay: anime.stagger(100),
    duration: 500,
    easing: 'easeOutBack'
  });

  anime({
    targets: '.sidebar-nav-item.active .nav-icon, .mobile-nav-item.active .nav-icon',
    scale: [0, 1],
    opacity: [0, 1],
    duration: 600,
    easing: 'easeOutBack'
  });
});
</script>
</body>
</html>
